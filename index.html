<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knock, clock..!</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍒</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;background:#B4CF9E;color:#1a1a1a;font-family:'DM Mono','Courier New',monospace;}
.btn{cursor:pointer;border:none;transition:all 0.15s;background:none;font-family:'DM Mono',monospace;}
.btn:active{transform:scale(0.97);}
input:focus{outline:none;}
@keyframes wBounce{0%,100%{transform:scale(1) rotate(-4deg)}50%{transform:scale(1.35) rotate(7deg)}}
@keyframes mBounce{0%{transform:scale(1)}20%{transform:scale(2.4) rotate(-8deg)}60%{transform:scale(1.9) rotate(5deg)}100%{transform:scale(1)}}
@keyframes mFade{0%,100%{opacity:0;transform:translateY(0)}15%,80%{opacity:1;transform:translateY(-8px)}}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes breathe{0%,100%{opacity:0.6}50%{opacity:1}}
.card{background:rgba(255,255,255,0.55);border:2.5px solid #6c2735;border-radius:20px;padding:16px;backdrop-filter:blur(8px);}
.wrap{max-width:480px;margin:0 auto;padding:0 22px;}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef} = React;
const BURG="#6c2735", PINK="#FF87D7", BG="#B4CF9E";
const PALETTE=["#6c2735","#00C9A7","#F7B731","#A29BFE","#FF87D7"];
const getColor=i=>PALETTE[i%PALETTE.length];
const WORK_EMOJIS=["⚡️","✏️","📐","💡","🎯","📝","🔥","✂️","📌","🖊️"];
const SURPRISE_EMOJIS=["🦓","👽","👾","🩷"];
const getEmoji=idx=>idx%10===7?SURPRISE_EMOJIS[Math.floor(idx/10)%SURPRISE_EMOJIS.length]:WORK_EMOJIS[idx%WORK_EMOJIS.length];
const fmt=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(sc).padStart(2,"0")}`;};
const fmtH=s=>(s/3600).toFixed(1);
const todayKey=()=>new Date().toISOString().split("T")[0];
const getDIM=(y,mo)=>new Date(y,mo+1,0).getDate();

// localStorage helpers
const lsGet=(k,def)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

function PieChart({slices,size=110}){
  const cx=size/2,cy=size/2,r=size/2-6,ir=r*0.48;
  let cum=0;
  const total=slices.reduce((a,s)=>a+s.val,0);
  if(total===0)return(
    <svg width={size} height={size}>
      <circle cx={cx} cy={cy} r={r} fill="rgba(0,0,0,0.07)"/>
      <circle cx={cx} cy={cy} r={ir} fill="rgba(255,255,255,0.55)"/>
      <text x={cx} y={cy+4} textAnchor="middle" fontSize={9} fill="#aaa">no data</text>
    </svg>
  );
  const paths=slices.map((sl,i)=>{
    const frac=sl.val/total,a0=cum*2*Math.PI-Math.PI/2,a1=(cum+frac)*2*Math.PI-Math.PI/2;
    cum+=frac;
    const x1=cx+r*Math.cos(a0),y1=cy+r*Math.sin(a0),x2=cx+r*Math.cos(a1),y2=cy+r*Math.sin(a1);
    const ix1=cx+ir*Math.cos(a0),iy1=cy+ir*Math.sin(a0),ix2=cx+ir*Math.cos(a1),iy2=cy+ir*Math.sin(a1);
    const lg=frac>0.5?1:0;
    return<path key={i} d={`M${ix1} ${iy1} L${x1} ${y1} A${r} ${r} 0 ${lg} 1 ${x2} ${y2} L${ix2} ${iy2} A${ir} ${ir} 0 ${lg} 0 ${ix1} ${iy1} Z`} fill={sl.color} stroke="rgba(255,255,255,0.6)" strokeWidth={1.5}/>;
  });
  return(
    <svg width={size} height={size} style={{filter:"drop-shadow(0 2px 6px rgba(0,0,0,0.12))"}}>
      {paths}
      <circle cx={cx} cy={cy} r={ir} fill="rgba(255,255,255,0.72)"/>
      <text x={cx} y={cy-5} textAnchor="middle" fontSize={13} fontWeight="700" fill="#1a1a1a" fontFamily="Syne,sans-serif">{(total/3600).toFixed(1)}</text>
      <text x={cx} y={cy+9} textAnchor="middle" fontSize={9} fill="#888" fontFamily="DM Mono,monospace">hours</text>
    </svg>
  );
}

function DayModal({dateKey,logs,projLogs,projects,onClose,onSave}){
  const total=logs[dateKey]||0,pTimes=projLogs[dateKey]||{};
  const [editTimes,setEditTimes]=useState(projects.reduce((acc,p)=>({...acc,[p]:fmtH(pTimes[p]||0)}),{}));
  const handleSave=()=>{
    const newPTimes={};let newTotal=0;
    projects.forEach(p=>{const v=parseFloat(editTimes[p])||0;newPTimes[p]=Math.round(v*3600);newTotal+=newPTimes[p];});
    onSave(dateKey,newTotal,newPTimes);onClose();
  };
  const pieSlices=projects.map((p,i)=>({val:pTimes[p]||0,color:getColor(i)})).filter(s=>s.val>0);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#F5F0E6",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:480,padding:"24px 22px 40px",animation:"slideUp 0.25s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:20,color:"#1a1a1a"}}>{dateKey.replace(/-/g,"/")}</div>
            <div style={{fontSize:10,color:"#888",letterSpacing:2,marginTop:2}}>DAILY LOG</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,color:"#aaa",cursor:"pointer"}}>✕</button>
        </div>
        {total>0&&(
          <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:16,background:"rgba(255,255,255,0.6)",borderRadius:14,padding:12}}>
            <PieChart slices={pieSlices} size={90}/>
            <div style={{flex:1}}>
              {projects.map((p,i)=>{const s=pTimes[p]||0,pct=total>0?Math.round((s/total)*100):0;return s>0?(
                <div key={p} style={{marginBottom:5}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:2}}>
                    <span style={{color:getColor(i),fontWeight:500}}>{p}</span>
                    <span style={{color:"#aaa"}}>{fmtH(s)}h · {pct}%</span>
                  </div>
                  <div style={{height:3,background:"rgba(0,0,0,0.08)",borderRadius:2,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pct}%`,background:getColor(i),borderRadius:2}}/>
                  </div>
                </div>
              ):null;})}
            </div>
          </div>
        )}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,color:"#888",letterSpacing:2,marginBottom:10}}>✏️ EDIT HOURS</div>
          {projects.map((p,i)=>(
            <div key={p} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:getColor(i),flexShrink:0}}/>
              <span style={{flex:1,fontSize:12,color:"#555"}}>{p}</span>
              <input type="number" min="0" step="0.5" value={editTimes[p]}
                onChange={e=>setEditTimes(t=>({...t,[p]:e.target.value}))}
                style={{width:60,padding:"6px 8px",border:`1.5px solid rgba(108,39,53,0.3)`,borderRadius:8,fontFamily:"DM Mono,monospace",fontSize:12,textAlign:"center",background:"rgba(255,255,255,0.8)"}}/>
              <span style={{fontSize:10,color:"#aaa"}}>h</span>
            </div>
          ))}
        </div>
        <button onClick={handleSave} style={{width:"100%",padding:"13px 0",borderRadius:40,background:BURG,color:"#fff",fontFamily:"Syne,sans-serif",fontSize:14,fontWeight:700,letterSpacing:2,border:"none",cursor:"pointer"}}>保存する</button>
      </div>
    </div>
  );
}

function App(){
  const [view,setView]=useState("timer");
  const [maxMonthH,setMaxMonthH]=useState(()=>lsGet("kc_maxMonth",160));
  const [maxDayH,setMaxDayH]=useState(()=>lsGet("kc_maxDay",8));
  const [projects,setProjects]=useState(()=>lsGet("kc_projects",["デザイン案件A","開発案件B","ライティングC"]));
  const [settingMaxM,setSettingMaxM]=useState(String(lsGet("kc_maxMonth",160)));
  const [settingMaxD,setSettingMaxD]=useState(String(lsGet("kc_maxDay",8)));
  const [running,setRunning]=useState(false);
  const [onBreak,setOnBreak]=useState(false);
  const [activeProject,setActiveProject]=useState(()=>lsGet("kc_projects",["デザイン案件A"])[0]);
  const [elapsed,setElapsed]=useState(()=>lsGet(`kc_elapsed_${todayKey()}`,0));
  const [dayStart,setDayStart]=useState(null);
  const [projectTimes,setProjectTimes]=useState(()=>lsGet(`kc_ptimes_${todayKey()}`,{}));
  const [logs,setLogs]=useState(()=>lsGet("kc_logs",{}));
  const [projLogs,setProjLogs]=useState(()=>lsGet("kc_projlogs",{}));
  const [emojiIdx,setEmojiIdx]=useState(0);
  const [milestone,setMilestone]=useState(null);
  const [showAddInput,setShowAddInput]=useState(false);
  const [newProjName,setNewProjName]=useState("");
  const [editingProj,setEditingProj]=useState(null);
  const [currentMonth,setCurrentMonth]=useState(new Date().getMonth());
  const [currentYear,setCurrentYear]=useState(new Date().getFullYear());
  const [selectedDay,setSelectedDay]=useState(null);
  const intervalRef=useRef(null),emojiRef=useRef(null),midnightRef=useRef(null),longPressRef=useRef(null);

  // persist
  useEffect(()=>lsSet("kc_projects",projects),[projects]);
  useEffect(()=>lsSet("kc_maxMonth",maxMonthH),[maxMonthH]);
  useEffect(()=>lsSet("kc_maxDay",maxDayH),[maxDayH]);
  useEffect(()=>lsSet("kc_logs",logs),[logs]);
  useEffect(()=>lsSet("kc_projlogs",projLogs),[projLogs]);
  useEffect(()=>{lsSet(`kc_elapsed_${todayKey()}`,elapsed);lsSet(`kc_ptimes_${todayKey()}`,projectTimes);},[elapsed,projectTimes]);

  useEffect(()=>{
    const schedule=()=>{
      const n=new Date(),next=new Date(n);next.setHours(24,0,0,0);
      midnightRef.current=setTimeout(()=>{
        setElapsed(0);setProjectTimes({});setDayStart(null);setRunning(false);setOnBreak(false);schedule();
      },next-n);
    };
    schedule();
    return()=>clearTimeout(midnightRef.current);
  },[]);

  useEffect(()=>{
    if(running&&!onBreak){
      intervalRef.current=setInterval(()=>{
        setElapsed(e=>{
          const next=e+1;
          if(Math.floor(next/3600)>Math.floor(e/3600)&&next>0){setMilestone(`${Math.floor(next/3600)}h`);setTimeout(()=>setMilestone(null),2200);}
          return next;
        });
        setProjectTimes(pt=>({...pt,[activeProject]:(pt[activeProject]||0)+1}));
      },1000);
      emojiRef.current=setInterval(()=>setEmojiIdx(i=>i+1),1200);
    }
    return()=>{clearInterval(intervalRef.current);clearInterval(emojiRef.current);};
  },[running,onBreak,activeProject]);

  useEffect(()=>{
    if(elapsed>0){
      const dk=todayKey();
      setLogs(prev=>({...prev,[dk]:elapsed}));
      setProjLogs(prev=>({...prev,[dk]:projectTimes}));
    }
  },[elapsed]);

  const handleStart=()=>{if(!dayStart)setDayStart(new Date());setRunning(true);setOnBreak(false);};
  const handleStop=()=>{setRunning(false);setOnBreak(false);};
  const handleBreak=()=>{if(running)setOnBreak(b=>!b);};
  const handleAddProject=()=>{
    const name=newProjName.trim();
    if(name&&!projects.includes(name)){setProjects(p=>[...p,name]);setActiveProject(name);}
    setNewProjName("");setShowAddInput(false);
  };
  const handleDeleteProj=i=>{
    const next=projects.filter((_,j)=>j!==i);
    setProjects(next);if(activeProject===projects[i])setActiveProject(next[0]||"");
  };
  const handleRenameProj=(i,newName)=>{
    if(!newName.trim())return;
    const next=[...projects],old=next[i];next[i]=newName.trim();setProjects(next);
    if(activeProject===old)setActiveProject(newName.trim());
    setProjectTimes(pt=>{const n={...pt};if(n[old]){n[newName.trim()]=n[old];delete n[old];}return n;});
    setEditingProj(null);
  };
  const handleDaySave=(dateKey,newTotal,newPTimes)=>{
    setLogs(prev=>({...prev,[dateKey]:newTotal}));
    setProjLogs(prev=>({...prev,[dateKey]:newPTimes}));
  };
  const startLongPress=i=>{longPressRef.current=setTimeout(()=>setEditingProj({index:i,name:projects[i]}),500);};
  const cancelLongPress=()=>clearTimeout(longPressRef.current);

  const todayTotal=elapsed,todayH=todayTotal/3600;
  const todayPieSlices=projects.map((p,i)=>({val:projectTimes[p]||0,color:getColor(i)})).filter(s=>s.val>0);
  const todayComment=todayH===0?"さあ、今日もいこう！✨":todayH<2?"いいスタート！☀️":todayH<maxDayH*0.75?"いい感じ👍 ペース保ってこ":todayH<maxDayH?"そろそろひと息つこ☕️":todayH<maxDayH*1.25?"休みとってねー🙏":"働きすぎ！今すぐ休んで🚨";
  const monthlySeconds=Object.entries(logs).filter(([k])=>{const d=new Date(k);return d.getMonth()===currentMonth&&d.getFullYear()===currentYear;}).reduce((s,[,v])=>s+v,0);
  const monthlyH=monthlySeconds/3600,ratio=Math.min(monthlyH/maxMonthH,1);
  const overwork=monthlyH>maxMonthH*0.9,overworkBig=monthlyH>maxMonthH;
  const monthComment=overworkBig?"🚨 働きすぎ！ちゃんと休もう":overwork?"⚠️ そろそろペース落としてもいいかも":monthlyH>maxMonthH*0.5?`👍 いい調子！残り${(maxMonthH-monthlyH).toFixed(1)}h`:`✨ まだ余裕あり！${(maxMonthH-monthlyH).toFixed(1)}h 残り`;
  const daysInMonth=getDIM(currentYear,currentMonth),weeks=[],firstDay=new Date(currentYear,currentMonth,1).getDay();
  let dc=1;
  for(let w=0;w<6;w++){const week=[];for(let d=0;d<7;d++)week.push((w===0&&d<firstDay)||dc>daysInMonth?null:dc++);weeks.push(week);if(dc>daysInMonth)break;}
  const monthName=new Date(currentYear,currentMonth).toLocaleDateString("ja-JP",{year:"numeric",month:"long"});
  const cardS={background:"rgba(255,255,255,0.55)",border:"2.5px solid #6c2735",borderRadius:20,padding:16,backdropFilter:"blur(8px)"};

  return(
    <div style={{minHeight:"100vh",background:BG,color:"#1a1a1a",fontFamily:"'DM Mono','Courier New',monospace"}}>
      <div className="wrap" style={{paddingTop:24,paddingBottom:0,display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"block",width:"100%",fontFamily:"Syne,sans-serif",fontSize:24,fontWeight:800,color:"#fff",lineHeight:1.1,background:BURG,padding:"8px 18px 10px",borderRadius:8,boxShadow:"3px 3px 0px rgba(108,39,53,0.3)"}}>
          Knock, clock..!
          <div style={{fontSize:9,letterSpacing:2.5,color:"rgba(255,255,255,0.55)",marginTop:3,fontFamily:"DM Mono,monospace",fontWeight:400}}>multi time manager</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {["timer","calendar"].map(v=>(
            <button key={v} className="btn" onClick={()=>setView(v)} style={{flex:1,padding:"9px 0",borderRadius:40,background:view===v?BURG:"rgba(255,255,255,0.4)",color:view===v?"#fff":"#666",border:`2.5px solid ${view===v?BURG:BURG+"44"}`,fontSize:10,letterSpacing:1,whiteSpace:"nowrap",textAlign:"center"}}>
              {v==="timer"?"TIMER⏰":"CALENDAR🗓️"}
            </button>
          ))}
          <button className="btn" onClick={()=>setView("settings")} style={{padding:"9px 12px",borderRadius:40,background:view==="settings"?BURG:"rgba(255,255,255,0.4)",color:view==="settings"?"#fff":"#666",border:`2.5px solid ${view==="settings"?BURG:BURG+"44"}`,fontSize:13,whiteSpace:"nowrap"}}>⚙️</button>
        </div>
      </div>

      <div className="wrap" style={{paddingTop:18,paddingBottom:48,animation:"slideIn 0.3s ease"}}>
        {view==="timer"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{...cardS,padding:"28px 20px 20px",textAlign:"center",position:"relative"}}>
              <div style={{position:"absolute",top:12,right:14,display:"flex",alignItems:"center",gap:5,minHeight:28}}>
                {running&&!onBreak&&!milestone&&(<><span style={{fontSize:18,display:"inline-block",animation:"wBounce 1.2s ease-in-out infinite"}}>{getEmoji(emojiIdx)}</span><span style={{fontSize:9,color:BURG,letterSpacing:2,animation:"pulse 2s infinite"}}>WORKING!</span></>)}
                {onBreak&&<span style={{fontSize:9,color:"#888",letterSpacing:2,animation:"breathe 2s infinite"}}>☕️ BREAK</span>}
                {milestone&&(<div style={{display:"flex",flexDirection:"column",alignItems:"center",animation:"mFade 2.2s ease forwards"}}><span style={{fontSize:26,display:"inline-block",animation:"mBounce 2.2s ease forwards"}}>🎉</span><span style={{fontSize:9,color:BURG,letterSpacing:2,fontWeight:500}}>{milestone} DONE!</span></div>)}
              </div>
              <div style={{fontSize:13,fontWeight:500,color:BURG,letterSpacing:2,marginBottom:4,fontFamily:"DM Mono,monospace"}}>{new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit"})}</div>
              <div style={{fontSize:10,color:"#888",letterSpacing:3,marginBottom:6}}>TODAY TOTAL</div>
              <div style={{fontFamily:"Syne,sans-serif",fontSize:"min(58px, 12vw)",fontWeight:800,letterSpacing:-2,color:onBreak?"#bbb":running?"#1a1a1a":"#ccc",transition:"color 0.3s",lineHeight:1}}>{fmt(elapsed)}</div>
              {dayStart&&<div style={{fontSize:10,color:"#aaa",marginTop:6}}>開始 {dayStart.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})}</div>}
              <div style={{marginTop:18,display:"flex",gap:8,justifyContent:"center",alignItems:"center"}}>
                <div style={{flex:1}}>
                  {!running
                    ?<button className="btn" onClick={handleStart} style={{width:"100%",padding:"13px 0",borderRadius:40,background:BURG,color:"#fff",fontFamily:"Syne,sans-serif",fontSize:14,fontWeight:700,letterSpacing:2}}>▶ START</button>
                    :<button className="btn" onClick={handleStop} style={{width:"100%",padding:"13px 0",borderRadius:40,background:"transparent",color:BURG,border:`2px solid ${BURG}`,fontFamily:"Syne,sans-serif",fontSize:14,fontWeight:700,letterSpacing:2}}>■ STOP</button>
                  }
                </div>
                <button className="btn" onClick={handleBreak} disabled={!running} style={{padding:"13px 14px",borderRadius:40,fontSize:12,fontWeight:500,background:onBreak?"#fff7e6":"rgba(255,255,255,0.45)",color:onBreak?"#c07800":"#888",border:`1.5px solid ${onBreak?"#F7B731":"rgba(0,0,0,0.12)"}`,opacity:running?1:0.4,whiteSpace:"nowrap"}}>{onBreak?"Restart🔥":"Break☕️"}</button>
              </div>
            </div>

            <div style={{...cardS}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div><span style={{fontSize:10,color:"#777",letterSpacing:3}}>ACTIVE PROJECT</span><span style={{fontSize:9,color:"#aaa",marginLeft:6}}>{running&&!onBreak?"↑ タップで切り替え":"↑ タップ→START"}</span></div>
                <button className="btn" onClick={()=>setShowAddInput(v=>!v)} style={{width:26,height:26,borderRadius:13,background:BURG,color:"#fff",fontSize:17,display:"flex",alignItems:"center",justifyContent:"center"}}>＋</button>
              </div>
              {showAddInput&&(<div style={{display:"flex",gap:6,marginBottom:10,animation:"fadeIn 0.15s"}}>
                <input autoFocus value={newProjName} onChange={e=>setNewProjName(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")handleAddProject();if(e.key==="Escape"){setShowAddInput(false);setNewProjName("");}}} placeholder="新しい案件名..." style={{flex:1,padding:"8px 12px",border:`1.5px solid ${BURG}`,borderRadius:8,background:"rgba(255,255,255,0.8)",fontFamily:"DM Mono,monospace",fontSize:12,color:"#1a1a1a"}}/>
                <button className="btn" onClick={handleAddProject} style={{padding:"8px 14px",background:BURG,borderRadius:8,color:"#fff",fontWeight:700,fontSize:11}}>追加</button>
              </div>)}
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                {projects.map((p,i)=>{
                  const pSec=projectTimes[p]||0,isActive=activeProject===p,col=getColor(i),isEditing=editingProj?.index===i;
                  return(<div key={p} style={{display:"flex",alignItems:"center",gap:6}}>
                    {isEditing?(<div style={{flex:1,display:"flex",gap:6,animation:"fadeIn 0.15s"}}>
                      <input autoFocus value={editingProj.name} onChange={e=>setEditingProj(ep=>({...ep,name:e.target.value}))} onKeyDown={e=>{if(e.key==="Enter")handleRenameProj(i,editingProj.name);if(e.key==="Escape")setEditingProj(null);}} style={{flex:1,padding:"10px 12px",border:`1.5px solid ${col}`,borderRadius:10,background:"rgba(255,255,255,0.8)",fontFamily:"DM Mono,monospace",fontSize:13}}/>
                      <button className="btn" onClick={()=>handleRenameProj(i,editingProj.name)} style={{padding:"10px 12px",background:col,borderRadius:10,color:"#fff",fontWeight:700,fontSize:11}}>保存</button>
                      <button className="btn" onClick={()=>setEditingProj(null)} style={{padding:"10px 10px",background:"rgba(0,0,0,0.06)",borderRadius:10,color:"#aaa",fontSize:11}}>✕</button>
                    </div>):(<>
                      <button className="btn" onClick={()=>{setActiveProject(p);if(!running)handleStart();}} onMouseDown={()=>startLongPress(i)} onMouseUp={cancelLongPress} onMouseLeave={cancelLongPress} onTouchStart={()=>startLongPress(i)} onTouchEnd={cancelLongPress} onContextMenu={e=>{e.preventDefault();setEditingProj({index:i,name:p});}} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:10,background:isActive?`${col}22`:"transparent",border:`1.5px solid ${isActive?col:"rgba(0,0,0,0.1)"}`,color:isActive?col:"#888",fontFamily:"DM Mono,monospace",fontSize:13,transition:"all 0.18s"}}>
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <div style={{width:8,height:8,borderRadius:"50%",background:isActive?col:"#ccc",animation:isActive&&running&&!onBreak?"pulse 1s infinite":"none",flexShrink:0}}/>
                          <span style={{fontWeight:isActive?500:400}}>{p}</span>
                          {isActive&&running&&!onBreak&&<span style={{fontSize:9,color:col,letterSpacing:1,opacity:0.8}}>● ON</span>}
                          {isActive&&!running&&<span style={{fontSize:9,color:col,letterSpacing:1,opacity:0.7}}>選択中</span>}
                        </div>
                        <span style={{fontSize:12}}>{fmt(pSec)}</span>
                      </button>
                      <button className="btn" onClick={()=>handleDeleteProj(i)} style={{width:28,height:28,borderRadius:14,background:"rgba(0,0,0,0.06)",color:"#ccc",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
                    </>)}
                  </div>);
                })}
              </div>
            </div>

            <div style={{...cardS}}>
              <div style={{fontSize:10,color:"#777",letterSpacing:3,marginBottom:12}}>TODAY'S SUMMARY</div>
              <div style={{display:"flex",alignItems:"center",gap:16}}>
                <PieChart slices={todayPieSlices.length>0?todayPieSlices:projects.map((_,i)=>({val:0,color:getColor(i)}))} size={110}/>
                <div style={{flex:1}}>
                  {projects.map((p,i)=>{const s=projectTimes[p]||0,total=todayTotal||1,pct=Math.round((s/total)*100)||0,col=getColor(i);return s>0?(<div key={p} style={{marginBottom:6}}><div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:2}}><span style={{color:col,fontWeight:500}}>{p}</span><span style={{color:"#aaa"}}>{fmtH(s)}h · {pct}%</span></div><div style={{height:4,background:"rgba(0,0,0,0.08)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:col,borderRadius:2,transition:"width 0.5s"}}/></div></div>):null;})}
                  <div style={{marginTop:8,fontSize:11,color:todayH>maxDayH?"#c0392b":todayH>maxDayH*0.75?"#8A6A00":"#777"}}>{todayComment}</div>
                </div>
              </div>
            </div>

            <div style={{...cardS,borderColor:overworkBig?`${BURG}88`:"#6c2735"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{fontSize:10,color:"#777",letterSpacing:3}}>THIS MONTH</span>
                <span style={{fontSize:12,fontWeight:500,color:overworkBig?BURG:PINK}}>{monthlyH.toFixed(1)}h / {maxMonthH}h</span>
              </div>
              <div style={{height:6,background:"rgba(0,0,0,0.08)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${ratio*100}%`,background:overworkBig?BURG:overwork?"#F7B731":PINK,borderRadius:3,transition:"width 0.5s"}}/></div>
              <div style={{marginTop:8,fontSize:11,color:overworkBig?BURG:overwork?"#8A6A00":"#777"}}>{monthComment}</div>
            </div>
          </div>
        )}

        {view==="calendar"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{...cardS,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <button className="btn" onClick={()=>{if(currentMonth===0){setCurrentMonth(11);setCurrentYear(y=>y-1);}else setCurrentMonth(m=>m-1);}} style={{color:"#888",fontSize:22,padding:"0 8px"}}>‹</button>
              <div style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:16}}>{monthName}</div>
              <button className="btn" onClick={()=>{if(currentMonth===11){setCurrentMonth(0);setCurrentYear(y=>y+1);}else setCurrentMonth(m=>m+1);}} style={{color:"#888",fontSize:22,padding:"0 8px"}}>›</button>
            </div>
            <div style={{...cardS,borderColor:overworkBig?`${BURG}55`:"#6c2735"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div><div style={{fontSize:10,color:"#777",letterSpacing:3,marginBottom:4}}>MONTHLY TOTAL</div><div style={{fontFamily:"Syne,sans-serif",fontSize:40,fontWeight:800,letterSpacing:-1,color:overworkBig?BURG:"#1a1a1a",lineHeight:1}}>{monthlyH.toFixed(1)}<span style={{fontSize:18,fontWeight:400,color:"#bbb"}}>h</span></div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:10,color:"#777",letterSpacing:3,marginBottom:4}}>LIMIT</div><div style={{fontSize:22,fontWeight:700,color:"#ccc"}}>{maxMonthH}h</div></div>
              </div>
              <div style={{height:4,background:"rgba(0,0,0,0.08)",borderRadius:2,margin:"12px 0 8px",overflow:"hidden"}}><div style={{height:"100%",width:`${ratio*100}%`,background:overworkBig?BURG:overwork?"#F7B731":PINK,borderRadius:2,transition:"width 0.5s"}}/></div>
              <div style={{fontSize:11,color:overworkBig?BURG:overwork?"#8A6A00":"#777"}}>{monthComment}</div>
            </div>
            <div style={{...cardS}}>
              <div style={{fontSize:9,color:"#aaa",letterSpacing:1,marginBottom:8,textAlign:"right"}}>📌 日付をタップで詳細・編集</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:6}}>
                {["日","月","火","水","木","金","土"].map((d,i)=>(<div key={d} style={{textAlign:"center",fontSize:9,fontWeight:500,color:i===0?`${BURG}99`:"#999",letterSpacing:1}}>{d}</div>))}
              </div>
              {weeks.map((week,wi)=>(<div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:3}}>
                {week.map((day,di)=>{
                  if(!day)return<div key={di}/>;
                  const dKey=`${currentYear}-${String(currentMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
                  const secs=logs[dKey]||0,hrs=secs/3600,isToday=new Date().getDate()===day&&new Date().getMonth()===currentMonth&&new Date().getFullYear()===currentYear,intensity=Math.min(hrs/maxDayH,1);
                  return(<div key={di} onClick={()=>setSelectedDay(dKey)} style={{aspectRatio:"1/1",borderRadius:8,background:secs>0?`rgba(108,39,53,${0.1+intensity*0.65})`:"rgba(255,255,255,0.3)",border:isToday?`1.5px solid ${BURG}`:"1.5px solid transparent",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                    <div style={{fontSize:11,color:isToday?BURG:secs>0?(intensity>0.45?"#fff":"#1a1a1a"):"#bbb",fontWeight:isToday?700:400}}>{day}</div>
                    {secs>0&&<div style={{fontSize:7,color:intensity>0.45?"rgba(255,255,255,0.8)":`${BURG}aa`,marginTop:1}}>{hrs.toFixed(1)}h</div>}
                  </div>);
                })}
              </div>))}
            </div>
            {Object.entries(logs).filter(([k])=>{const d=new Date(k);return d.getMonth()===currentMonth&&d.getFullYear()===currentYear;}).length>0&&(
              <div style={{...cardS}}>
                <div style={{fontSize:10,color:"#777",letterSpacing:3,marginBottom:12}}>WORK LOG</div>
                {Object.entries(logs).filter(([k])=>{const d=new Date(k);return d.getMonth()===currentMonth&&d.getFullYear()===currentYear;}).sort((a,b)=>b[0].localeCompare(a[0])).map(([date,secs])=>(<div key={date} onClick={()=>setSelectedDay(date)} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid rgba(0,0,0,0.06)",fontSize:12,cursor:"pointer"}}><span style={{color:"#888"}}>{date}</span><span style={{color:"#1a1a1a",fontWeight:500}}>{fmtH(secs)}h ›</span></div>))}
              </div>
            )}
          </div>
        )}

        {view==="settings"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{...cardS}}>
              <div style={{fontSize:10,color:"#777",letterSpacing:3,marginBottom:12}}>ℹ️ ABOUT</div>
              <div style={{fontSize:12,color:"#1a1a1a",lineHeight:1.9}}>
                <div>📅 タイマーは深夜0時に自動リセット</div>
                <div>💾 データはブラウザに自動保存</div>
                <div>🌙 ブレイク中は時間が止まります</div>
                <div>🎉 1時間ごとにお祝いが来るよ！</div>
                <div>✏️ 案件を長押し or 右クリックで編集</div>
                <div>📌 カレンダーの日付をタップで詳細・編集</div>
              </div>
            </div>
            <div style={{...cardS}}>
              <div style={{fontSize:10,color:"#777",letterSpacing:3,marginBottom:14}}>⏱ WORK LIMITS</div>
              {[{label:"1日の上限 (h)",val:settingMaxD,set:setSettingMaxD,apply:()=>{const n=parseFloat(settingMaxD);if(n>0)setMaxDayH(n);}},{label:"月の上限 (h)",val:settingMaxM,set:setSettingMaxM,apply:()=>{const n=parseFloat(settingMaxM);if(n>0)setMaxMonthH(n);}}].map(({label,val,set,apply})=>(<div key={label} style={{marginBottom:12}}><div style={{fontSize:11,color:"#777",marginBottom:6}}>{label}</div><div style={{display:"flex",gap:8}}><input value={val} onChange={e=>set(e.target.value)} type="number" min="1" style={{flex:1,padding:"9px 12px",border:"1.5px solid rgba(108,39,53,0.2)",borderRadius:10,background:"rgba(255,255,255,0.7)",fontFamily:"DM Mono,monospace",fontSize:13}}/><button className="btn" onClick={apply} style={{padding:"9px 16px",background:BURG,borderRadius:10,color:"#fff",fontWeight:700,fontSize:11}}>保存</button></div></div>))}
              <div style={{fontSize:10,color:"#aaa",marginTop:4}}>現在: 1日 {maxDayH}h / 月 {maxMonthH}h</div>
            </div>
            <div style={{...cardS}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{fontSize:10,color:"#777",letterSpacing:3}}>📁 PROJECTS</div>
                <button className="btn" onClick={()=>setShowAddInput(v=>!v)} style={{width:26,height:26,borderRadius:13,background:BURG,color:"#fff",fontSize:17,display:"flex",alignItems:"center",justifyContent:"center"}}>＋</button>
              </div>
              {showAddInput&&(<div style={{display:"flex",gap:6,marginBottom:10,animation:"fadeIn 0.15s"}}><input autoFocus value={newProjName} onChange={e=>setNewProjName(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")handleAddProject();if(e.key==="Escape"){setShowAddInput(false);setNewProjName("");}}} placeholder="新しい案件名..." style={{flex:1,padding:"8px 12px",border:`1.5px solid ${BURG}`,borderRadius:8,background:"rgba(255,255,255,0.8)",fontFamily:"DM Mono,monospace",fontSize:12}}/><button className="btn" onClick={handleAddProject} style={{padding:"8px 14px",background:BURG,borderRadius:8,color:"#fff",fontWeight:700,fontSize:11}}>追加</button></div>)}
              {projects.map((p,i)=>{const col=getColor(i),isEditing=editingProj?.index===i;return(<div key={p} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid rgba(0,0,0,0.06)"}}><div style={{width:10,height:10,borderRadius:"50%",background:col,flexShrink:0}}/>{isEditing?(<><input autoFocus value={editingProj.name} onChange={e=>setEditingProj(ep=>({...ep,name:e.target.value}))} onKeyDown={e=>{if(e.key==="Enter")handleRenameProj(i,editingProj.name);if(e.key==="Escape")setEditingProj(null);}} style={{flex:1,padding:"4px 8px",border:`1.5px solid ${BURG}`,borderRadius:6,background:"rgba(255,255,255,0.8)",fontFamily:"DM Mono,monospace",fontSize:12}}/><button className="btn" onClick={()=>handleRenameProj(i,editingProj.name)} style={{fontSize:11,color:BURG,fontWeight:700}}>保存</button></>):(<><span style={{flex:1,fontSize:13}}>{p}</span><button className="btn" onClick={()=>setEditingProj({index:i,name:p})} style={{fontSize:12,color:"#aaa",padding:"2px 6px"}}>✏️</button><button className="btn" onClick={()=>handleDeleteProj(i)} style={{fontSize:12,color:"#ccc",padding:"2px 6px"}}>✕</button></>)}</div>);})}
            </div>
          </div>
        )}
      </div>

      {selectedDay&&<DayModal dateKey={selectedDay} logs={logs} projLogs={projLogs} projects={projects} onClose={()=>setSelectedDay(null)} onSave={handleDaySave}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
